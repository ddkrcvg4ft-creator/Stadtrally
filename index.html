<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadtrally</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: #1e1e1e;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00b894;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00a383;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">Checkpoint 1</h1>

  <img id="image" src="https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp" alt="Question Image">

  <p id="question">
    How many arches are here?
  </p>

  <input type="text" id="answer" placeholder="Write the answer here">

  <br>

  <button onclick="checkAnswer()">Submit</button>

  <p id="message"></p>

</div>

<script>

const questions = [
  {
    title: "Checkpoint 1",
    question: "What is the name of this place?",
    image: "https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp",
    answer: "Poarta Schei"
  },
  {
    title: "Question?",
    question: "How many arches does Poarta Schei have?",
    image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",
    answer: "3"
  },
  {
    title: "Chekpopint 2",
    question: "What is the name of this place?",
    image: "https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",
    answer: ""Beth Israel" Synagogue"
  },
  {
    title: "Question?",
    question: "When was the "Beth Israel" Synagogue built?",
    image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",
    answer: "1901"
  },
   {
    title: "Chekpopint 3",
    question: "What is the name of this place?",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Johannes_Honterus_School_Brasov_Building_A_part_1.JPG/250px-Johannes_Honterus_School_Brasov_Building_A_part_1.JPG",
    answer: "Corp A"
  },
  {
    title: "Question?",
    question: "Is it the oldest building belonging to our school?
      Yes/No",
    image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",
    answer: "Yes"
  },
   {
    title: "Chekpopint 4",
    question: "What is the name of this place?",
    image: "https://photos.wikimapia.org/p/00/04/61/14/82_big.jpg",
    answer: "Libraria Humanitas"
  },
  {
    title: "Question?",
    question: "Find a book with Nelson Mandela and take a picture with it       (Answer is ND)",
    image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",
    answer: "ND"
  },
   {
    title: "Chekpopint 5",
    question: "What is the name of this place?",
    image: "https://protopopiatul-brasov.ro/wp-content/uploads/2020/03/Biserica-Adormirea-Maicii-Domnului-Bra%C5%9Fov-Cetate-3.jpg",
    answer: "Biserica Adormirea Maicii Domnului"
  },
  {
    title: "Question?",
    question: "Of what religion is this church?",
    image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",
    answer: "Orthodox"
  },
  {
    title: "Chekpopint 6",
    question: "What is the name of this place?",
    image: "https://protopopiatul-brasov.ro/wp-content/uploads/2020/03/Biserica-Adormirea-Maicii-Domnului-Bra%C5%9Fov-Cetate-3.jpg",
    answer: "Biserica Adormirea Maicii Domnului"
  },
];

let currentQuestion = 0;

function checkAnswer() {

  const userAnswer = document
    .getElementById("answer")
    .value
    .toLowerCase()
    .trim();

  if(userAnswer === questions[currentQuestion].answer){

    currentQuestion++;

    if(currentQuestion < questions.length){

      document.getElementById("title").innerText =
        questions[currentQuestion].title;

      document.getElementById("question").innerText =
        questions[currentQuestion].question;

      document.getElementById("image").src =
        questions[currentQuestion].image;

      document.getElementById("answer").value = "";

      document.getElementById("message").innerText =
        "Correct!";
    }

  } else {

    document.getElementById("message").innerText =
      "Wrong answer!";
  }
}

</script>

</body>
</html>

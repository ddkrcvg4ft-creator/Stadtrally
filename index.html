<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadtrally</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 600px;
  background: #1e1e1e;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}

input,
select {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #00b894;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00a383;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

#message {
  margin-top: 15px;
  font-weight: bold;
}

#photo {
  background: white;
  color: black;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Group Selection</h1>

<img id="image"
src="https://mediacdn.libertatea.ro/unsafe/1200x664/smart/filters:format(webp):contrast(8):quality(75)/https://static4.libertatea.ro/wp-content/uploads/2019/06/brasov-centrul-orasului-brasov.jpg">

<p id="question">
What is your group number? (1, 2 or 3)
</p>

<input
type="text"
id="answer"
placeholder="Write the answer here">

<select id="multipleChoice" style="display:none;">
<option value="">Choose an answer</option>
</select>

<br><br>

<input
type="file"
id="photo"
accept="image/*"
style="display:none;">

<br>

<button id="submitBtn" onclick="checkAnswer()">
Submit
</button>

<p id="message"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const storage = firebase.storage();

/* =========================
   QUESTIONS
========================= */

const allQuestions = [

/* =========================
   ONLY PHOTO
========================= */

{
title: "Checkpoint 1",

question:
"Find this place and upload a photo!",

image:
"https://destepti.ro/wp-content/uploads/2016/08/imagine-din-lateral-cu-statuia-lui-johannes-honterus-din-brasov-judetul-brasov.jpg",

needsPhoto: false,

photoOnly: true,

multipleChoice: false
},

/* =========================
   MULTIPLE CHOICE
========================= */

{
title: "Question 1",

question:
"What important role did this person have in our school?",

image:
"https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",

answer: "director",

multipleChoice: true,

options: [
"director",
"teacher",
"janitor",
"student"
],

needsPhoto: false,

photoOnly: false
},
{
title: "Checkpoint 2",

question:
"Find this place and upload a photo!",

image:
"https://www.rizzohotel.ro/wp-content/uploads/2019/04/44561.jpg",

needsPhoto: false,

photoOnly: true,

multipleChoice: false
},

/* =========================
   MULTIPLE CHOICE
========================= */

{
title: "Question 2",

question:
"What color is this building?",

image:
"https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",

answer: "yellow",

multipleChoice: true,

options: [
"red",
"green",
"yellow",
"blue"
],

needsPhoto: false,

photoOnly: false
},

/* =========================
   ANSWER + PHOTO
========================= */

{
title: "Checkpoint 2",

question:
"Write the name of this place and upload a photo!",

image:
"https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",

answer: "beth israel synagogue",

needsPhoto: true,

photoOnly: false,

multipleChoice: false
}

];

/* =========================
   GROUP ORDERS
========================= */

const groupOrders = {

1: [0,1,2,3],
2: [2,3,0,1],
3: [1,0,3,2]

};

let questions = [];
let currentQuestion = -1;
let selectedGroup = null;

/* =========================
   LOAD QUESTION
========================= */

function loadQuestion() {

document.getElementById("title").innerText =
questions[currentQuestion].title;

document.getElementById("question").innerText =
questions[currentQuestion].question;

document.getElementById("image").src =
questions[currentQuestion].image;

document.getElementById("answer").value = "";

const photoInput =
document.getElementById("photo");

photoInput.value = null;

photoInput.type = "";

photoInput.type = "file";

const answerInput =
document.getElementById("answer");

const select =
document.getElementById("multipleChoice");

/* MULTIPLE CHOICE */

if (questions[currentQuestion].multipleChoice) {

answerInput.style.display = "none";

select.style.display = "inline-block";

select.innerHTML =
'<option value="">Choose an answer</option>';

questions[currentQuestion].options.forEach(option => {

select.innerHTML +=
`<option value="${option}">${option}</option>`;

});

} else {

select.style.display = "none";

if (questions[currentQuestion].photoOnly) {

answerInput.style.display = "none";

} else {

answerInput.style.display = "inline-block";

}

}

/* PHOTO INPUT */

if (
questions[currentQuestion].needsPhoto ||
questions[currentQuestion].photoOnly
) {

photoInput.style.display = "inline-block";

} else {

photoInput.style.display = "none";

}

}

/* =========================
   NEXT QUESTION
========================= */

function nextQuestion() {

currentQuestion++;

localStorage.setItem(
"currentQuestion",
currentQuestion
);

if (currentQuestion < questions.length) {

loadQuestion();

document.getElementById("message").innerText =
"Correct!";

} else {

document.getElementById("message").innerText =
"🎉 You finished the rally!";

}

}

/* =========================
   PENALTY TIMER
========================= */

function startPenaltyTimer(endTime) {

const button =
document.getElementById("submitBtn");

button.disabled = true;

const timer = setInterval(() => {

const timeLeft =
Math.ceil((endTime - Date.now()) / 1000);

if (timeLeft > 0) {

document.getElementById("message").innerText =
`Wrong answer! Wait ${timeLeft} seconds.`;

} else {

clearInterval(timer);

button.disabled = false;

localStorage.removeItem("penaltyEnd");

document.getElementById("message").innerText =
"You can try again!";

}

}, 1000);

}

/* =========================
   UPLOAD PHOTO
========================= */

function uploadPhotoAndContinue(file) {

const filename =

"group_" +
selectedGroup +
"_" +
currentQuestion +
"_" +
Date.now() +
"_" +
file.name;

const storageRef =
storage.ref("photos/" + filename);

storageRef.put(file)

.then(() => {

document.getElementById("message").innerText =
"Photo uploaded successfully!";

nextQuestion();

})

.catch(() => {

document.getElementById("message").innerText =
"Upload failed!";

});

}

/* =========================
   CHECK ANSWER
========================= */

function checkAnswer() {

let userAnswer = "";

/* GROUP SELECTION */

if (currentQuestion === -1) {

userAnswer =
document.getElementById("answer")
.value
.toLowerCase()
.trim();

} else {

/* MULTIPLE CHOICE */

if (questions[currentQuestion].multipleChoice) {

userAnswer =
document.getElementById("multipleChoice")
.value
.toLowerCase()
.trim();

} else {

/* NORMAL ANSWER */

userAnswer =
document.getElementById("answer")
.value
.toLowerCase()
.trim();

}

}

/* GROUP SELECTION */

if (currentQuestion === -1) {

if (groupOrders[userAnswer]) {

selectedGroup = userAnswer;

questions =
groupOrders[userAnswer]
.map(i => allQuestions[i]);

currentQuestion = 0;

localStorage.setItem(
"selectedGroup",
selectedGroup
);

localStorage.setItem(
"currentQuestion",
currentQuestion
);

loadQuestion();

document.getElementById("message").innerText =
"Group selected!";

} else {

document.getElementById("message").innerText =
"Invalid group number!";

}

return;

}

/* PHOTO ONLY */

if (questions[currentQuestion].photoOnly) {

const file =
document.getElementById("photo").files[0];

if (!file) {

document.getElementById("message").innerText =
"Please upload a photo first!";

return;

}

document.getElementById("message").innerText =
"Uploading photo...";

uploadPhotoAndContinue(file);

return;

}

/* ANSWER CHECK */

if (userAnswer === questions[currentQuestion].answer) {

/* ANSWER + PHOTO */

if (questions[currentQuestion].needsPhoto) {

const file =
document.getElementById("photo").files[0];

if (!file) {

document.getElementById("message").innerText =
"Please upload a photo first!";

return;

}

document.getElementById("message").innerText =
"Uploading photo...";

uploadPhotoAndContinue(file);

} else {

/* ONLY ANSWER / GRILĂ */

nextQuestion();

}

} else {

/* PENALTY */

const endTime =
Date.now() + 120000;

localStorage.setItem(
"penaltyEnd",
endTime
);

startPenaltyTimer(endTime);

}

}

/* =========================
   PAGE LOAD
========================= */

window.onload = function () {

const savedGroup =
localStorage.getItem("selectedGroup");

const savedQuestion =
localStorage.getItem("currentQuestion");

if (savedGroup && groupOrders[savedGroup]) {

selectedGroup = savedGroup;

questions =
groupOrders[savedGroup]
.map(i => allQuestions[i]);

currentQuestion =
Number(savedQuestion);

if (currentQuestion < questions.length) {

loadQuestion();

}

}

const savedEnd =
localStorage.getItem("penaltyEnd");

if (savedEnd && Date.now() < savedEnd) {

startPenaltyTimer(Number(savedEnd));

} else {

localStorage.removeItem("penaltyEnd");

document.getElementById("submitBtn").disabled =
false;

}

};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadtrally</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: #1e1e1e;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00b894;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00a383;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">Group Selection</h1>

  <img id="image" src="https://mediacdn.libertatea.ro/unsafe/1200x664/smart/filters:format(webp):contrast(8):quality(75)/https://static4.libertatea.ro/wp-content/uploads/2019/06/brasov-centrul-orasului-brasov.jpg" alt="Question Image">

  <p id="question">
    What is your group number? (1, 2 or 3)
  </p>

  <input type="text" id="answer" placeholder="Write the answer here">
  <br><br>

<input type="file" id="photo" accept="image/*">

  <br>

  <button onclick="checkAnswer()">Submit</button>

  <p id="message"></p>

</div>

<script>

const allQuestions = [

  {
    title: "Checkpoint 1",
    question: "Find this place and take a picture with it!",
    image: "https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp",
    answer: "poarta schei"
  },
  {
    title: "Question?",
    question: "What is the name of this place?",
    image: "https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp",
    answer: "poarta schei"
  },

  {
    title: "Checkpoint 2",
    question: "Find this place and take a picture with it!",
    image: "https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",
    answer: "beth israel synagogue"
  },
   {
    title: "Checkpoint 2",
    question: "What is the name of this place?",
    image: "https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",
    answer: "beth israel synagogue"
  },

  {
    title: "Checkpoint 3",
    question: "What is the name of this place?",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Johannes_Honterus_School_Brasov_Building_A_part_1.JPG/250px-Johannes_Honterus_School_Brasov_Building_A_part_1.JPG",
    answer: "corp a"
  }

];

const groupOrders = {

  1: [0, 1, 2],

  2: [1, 2, 0],

  3: [2, 0, 1]

};

let questions = [];
let currentQuestion = -1;

function loadQuestion() {

  document.getElementById("title").innerText =
    questions[currentQuestion].title;

  document.getElementById("question").innerText =
    questions[currentQuestion].question;

  document.getElementById("image").src =
    questions[currentQuestion].image;

  document.getElementById("answer").value = "";
}

function checkAnswer() {

  const userAnswer = document
    .getElementById("answer")
    .value
    .toLowerCase()
    .trim();

  if(currentQuestion === -1){

    if(groupOrders[userAnswer]){

      questions = groupOrders[userAnswer].map(index => allQuestions[index]);

      currentQuestion = 0;

      loadQuestion();

      document.getElementById("message").innerText =
        "Group selected!";
    }
    else {

      document.getElementById("message").innerText =
        "Invalid group number!";
    }

    return;
  }

  if(userAnswer === questions[currentQuestion].answer){

    currentQuestion++;

    if(currentQuestion < questions.length){

      loadQuestion();

      document.getElementById("message").innerText =
        "Correct!";

    } else {

      document.getElementById("message").innerText =
        "🎉 You finished the rally!";
    }

  } else {

    const button = document.querySelector("button");

    button.disabled = true;

    let timeLeft = 120;

    document.getElementById("message").innerText =
      `Wrong answer! Wait ${timeLeft} seconds.`;

    const timer = setInterval(() => {

      timeLeft--;

      document.getElementById("message").innerText =
        `Wrong answer! Wait ${timeLeft} seconds.`;

      if(timeLeft <= 0){

        clearInterval(timer);

        button.disabled = false;

        document.getElementById("message").innerText =
          "You can try again!";
      }

    }, 1000);
  }
}

</script>

</body>
</html>

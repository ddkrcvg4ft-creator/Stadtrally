<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadtrally</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 600px;
  background: #1e1e1e;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 20px;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 15px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #00b894;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #00a383;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

#message {
  margin-top: 15px;
  font-weight: bold;
}

#photo {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Welcome to the BRASOV STADTRALLY!</h1>

<img id="image"
src="https://mediacdn.libertatea.ro/unsafe/1200x664/smart/filters:format(webp):contrast(8):quality(75)/https://static4.libertatea.ro/wp-content/uploads/2019/06/brasov-centrul-orasului-brasov.jpg">

<p id="question">
What is your group number? (1, 2 or 3)
</p>

<input type="text" id="answer" placeholder="Write the answer here">

<select id="multipleChoice" style="display:none;">
<option value="">Choose an answer</option>
</select>

<br><br>

<input type="file" id="photo" accept="image/*" style="display:none;">

<br>

<button id="submitBtn" onclick="checkAnswer()">Submit</button>

<p id="message"></p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBCzzTb8lHh02inio5vI5ysmXAP16sVgpA",
  authDomain: "stadtrally-6dbca.firebaseapp.com",
  projectId: "stadtrally-6dbca",
  storageBucket: "stadtrally-6dbca.firebasestorage.app",
  messagingSenderId: "891948287876",
  appId: "1:891948287876:web:bd5eda4ad903a460f2b299"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

const allQuestions = [

/* PHOTO ONLY */

{
title: "Checkpoint 1",
question: "Find this place and take a picture with it!",
image: "https://upload.wikimedia.org/wikipedia/commons/0/0a/Johannes_Honterus_-_Denkmal_in_Kronstadt.JPG",

needsPhoto: true,
photoOnly: true
},

/* MULTIPLE CHOICE */

{
title: "Question 1",
question: "What was Johannes Honterus role in our school?",
image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",

answer: "Principal",

multipleChoice: true,

options: [
"Janitor",
"Teacher",
"Principal",
"No role"
],

needsPhoto: false
},

/* NORMAL ANSWER + PHOTO */

{
title: "Checkpoint 2",
question: "Find this place and take a picture with it!",
image: "https://upload.wikimedia.org/wikipedia/commons/9/93/Bastionul_%C5%A2es%C4%83torilor_-_Weberbastei_-_Tak%C3%A1csok_b%C3%A1sty%C3%A1ja.JPG",

needsPhoto: true,
photoOnly: true
},

/* NORMAL ANSWER */

{
title: "Question 2",
question: "What was the main role of the Weavers’ Bastion?",
image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",

answer: "Defense",

multipleChoice: true,

options: [
"Defense",
"Hospital",
"School",
"Market"
],

needsPhoto: false
},

/* PHOTO ONLY */

{
title: "Checkpoint 3",
question: "Find this place and take a picture with it!",
image: "https://locuridinromania.ro/wp-content/uploads/2016/08/Poarta-Schei-din-orasul-Brasov.jpg",

needsPhoto: true,
photoOnly: true
},

{
title: "Question 3",
question: "Why were the gates of Brașov closed during the night?",
image: "https://i.pinimg.com/736x/7d/91/f7/7d91f776f3695bae9ca0c0cd7d7c9832.jpg",

answer: "To protect the city",

multipleChoice: true,

options: [
"To stop trading",
"To prepare festivals",
"To protect the city",
"To clean the streets"
],

needsPhoto: false
},


];

const groupOrders = {
1: [0,1,2,3,4],
2: [2,3,4,0,1],
3: [4,0,1,2,3]
};

let questions = [];
let currentQuestion = -1;
let selectedGroup = null;

function loadQuestion() {

document.getElementById("title").innerText =
questions[currentQuestion].title;

document.getElementById("question").innerText =
questions[currentQuestion].question;

document.getElementById("image").src =
questions[currentQuestion].image;

document.getElementById("answer").value = "";

const answerInput =
document.getElementById("answer");

const select =
document.getElementById("multipleChoice");

/* MULTIPLE CHOICE */

if (questions[currentQuestion].multipleChoice) {

answerInput.style.display = "none";

select.style.display = "inline-block";

select.innerHTML =
'<option value="">Choose an answer</option>';

questions[currentQuestion].options.forEach(option => {

select.innerHTML +=
`<option value="${option}">${option}</option>`;

});

} else {

select.style.display = "none";

if (questions[currentQuestion].photoOnly) {

answerInput.style.display = "none";

} else {

answerInput.style.display = "inline-block";

}

}

// FIX RESET FILE INPUT
const photoInput = document.getElementById("photo");
photoInput.value = null;
photoInput.type = "";
photoInput.type = "file";

// SHOW/HIDE PHOTO INPUT
if (questions[currentQuestion].needsPhoto) {
  photoInput.style.display = "inline-block";
} else {
  photoInput.style.display = "none";
}
}

function nextQuestion() {
currentQuestion++;
localStorage.setItem("currentQuestion", currentQuestion);

if (currentQuestion < questions.length) {
  loadQuestion();
  document.getElementById("message").innerText = "Correct!";
} else {
  document.getElementById("message").innerText = "🎉 You finished the rally!";
}
}

function startPenaltyTimer(endTime) {
const button = document.getElementById("submitBtn");
button.disabled = true;

const timer = setInterval(() => {
const timeLeft = Math.ceil((endTime - Date.now()) / 1000);

if (timeLeft > 0) {
  document.getElementById("message").innerText =
    `Wrong answer! Wait ${timeLeft} seconds.`;
} else {
  clearInterval(timer);

  button.disabled = false;
  localStorage.removeItem("penaltyEnd");

  document.getElementById("message").innerText =
    "You can try again!";
}
}, 1000);
}

function checkAnswer() {

/* =========================
   GROUP SELECTION
========================= */

if (currentQuestion === -1) {

const userAnswer =
document.getElementById("answer")
.value
.toLowerCase()
.trim();

if (groupOrders[userAnswer]) {

selectedGroup = userAnswer;

questions =
groupOrders[userAnswer].map(i => allQuestions[i]);

currentQuestion = 0;

localStorage.setItem(
"selectedGroup",
selectedGroup
);

localStorage.setItem(
"currentQuestion",
currentQuestion
);

loadQuestion();

document.getElementById("message").innerText =
"Group selected!";

} else {

document.getElementById("message").innerText =
"Invalid group number!";

}

return;
}

/* =========================
   PHOTO ONLY
========================= */

if (questions[currentQuestion].photoOnly) {

const file =
document.getElementById("photo").files[0];

if (!file) {

document.getElementById("message").innerText =
"Please upload a photo first!";

return;

}

const filename =

"group_" +
selectedGroup +
"_" +
currentQuestion +
"_" +
Date.now() +
"_" +
file.name;

const storageRef =
storage.ref("photos/" + filename);

storageRef.put(file)

.then(() => {

document.getElementById("message").innerText =
"Photo uploaded successfully!";

nextQuestion();

})

.catch((error) => {

console.error(error);

document.getElementById("message").innerText =
"Upload failed!";

});

return;
}

/* =========================
   GET ANSWER
========================= */

let userAnswer = "";

if (questions[currentQuestion].multipleChoice) {

userAnswer =
document.getElementById("multipleChoice")
.value
.toLowerCase()
.trim();

} else {

userAnswer =
document.getElementById("answer")
.value
.toLowerCase()
.trim();

}

/* =========================
   ANSWER CHECK
========================= */

if (
userAnswer ===
questions[currentQuestion].answer.toLowerCase()
) {

if (questions[currentQuestion].needsPhoto) {

const file =
document.getElementById("photo").files[0];

if (!file) {

document.getElementById("message").innerText =
"Please upload a photo first!";

return;

}

const filename =

"group_" +
selectedGroup +
"_" +
currentQuestion +
"_" +
Date.now() +
"_" +
file.name;

const storageRef =
storage.ref("photos/" + filename);

storageRef.put(file)

.then(() => {

document.getElementById("message").innerText =
"Photo uploaded successfully!";

nextQuestion();

})

.catch((error) => {

console.error(error);

document.getElementById("message").innerText =
"Upload failed!";

});

} else {

nextQuestion();

}

} else {

/* =========================
   PENALTY
========================= */

const endTime =
Date.now() + 120000;

localStorage.setItem(
"penaltyEnd",
endTime
);

startPenaltyTimer(endTime);

}

}

window.onload = function () {

const savedGroup = localStorage.getItem("selectedGroup");
const savedQuestion = localStorage.getItem("currentQuestion");

if (savedGroup && groupOrders[savedGroup]) {

selectedGroup = savedGroup;

questions = groupOrders[savedGroup].map(i => allQuestions[i]);

currentQuestion = Number(savedQuestion);

if (currentQuestion < questions.length) {
  loadQuestion();
}
}

const savedEnd = localStorage.getItem("penaltyEnd");

if (savedEnd && Date.now() < savedEnd) {
  startPenaltyTimer(Number(savedEnd));
} else {
  localStorage.removeItem("penaltyEnd");
  document.getElementById("submitBtn").disabled = false;
}
};

</script>

</body>
</html>

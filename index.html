<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadtrally</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: #1e1e1e;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00b894;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00a383;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">Checkpoint 1</h1>

  <img id="image" src="https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp" alt="Question Image">

  <p id="question">
    How many arches are here?
  </p>

  <input type="text" id="answer" placeholder="Write the answer here">

  <br>

  <button onclick="checkAnswer()">Submit</button>

  <p id="message"></p>

</div>

<script>

const questions = [
  {
    title: "Checkpoint 1",
    question: "How many arches are here?",
    image: "https://wel.ro/wp-content/uploads/2024/09/poartascheibrasov-2.webp",
    answer: "6"
  },
  {
    title: "Checkpoint 2",
    question: "In what year was the synagogue in Brasov built?",
    image: "https://img.directbooking.ro/getimage.ashx?f=Obiective&w=440&file=ad118ec8-06e0-4d1d-a126-18dbdbe3f6e1_sinagoga_brasov1.jpg",
    answer: "1901"
  },
  {
    title: "Final",
    question: "Felicitări! Ai terminat rally-ul.",
    image: "https://picsum.photos/600/300?3",
    answer: ""
  }
];

let currentQuestion = 0;

function checkAnswer() {

  const userAnswer = document
    .getElementById("answer")
    .value
    .toLowerCase()
    .trim();

  if(userAnswer === questions[currentQuestion].answer){

    currentQuestion++;

    if(currentQuestion < questions.length){

      document.getElementById("title").innerText =
        questions[currentQuestion].title;

      document.getElementById("question").innerText =
        questions[currentQuestion].question;

      document.getElementById("image").src =
        questions[currentQuestion].image;

      document.getElementById("answer").value = "";

      document.getElementById("message").innerText =
        "Correct!";
    }

  } else {

    document.getElementById("message").innerText =
      "Wrong answer!";
  }
}

</script>

</body>
</html>
